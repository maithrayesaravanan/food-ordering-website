<!DOCTYPE html>
<html>
<head>
    <title>Food Ordering UI</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            display: flex;
            justify-content: space-between;
            background: #ff4d4d;
            color: white;
            padding: 15px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        .banner {
            text-align: center;
            padding: 50px;
            background: url('https://via.placeholder.com/800x300') no-repeat center;
            color: white;
            font-size: 24px;
        }

        .menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            width: 200px;
            box-shadow: 0 0 10px #ccc;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #e60000;
        }

        #cart {
            text-align: center;
            margin: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<header>
    <h1>🍔 Foodie Hub</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Cart (<span id="count">0</span>)</a>
    </nav>
</header>

<div class="banner">
    Delicious Food Delivered Fast 😋
</div>

<div class="menu">

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Pizza</h3>
        <p>₹199</p>
        <button onclick="addToCart(199)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Burger</h3>
        <p>₹99</p>
        <button onclick="addToCart(99)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Drink</h3>
        <p>₹49</p>
        <button onclick="addToCart(49)">Add to Cart</button>
    </div>

</div>

<div id="cart">
    Total Price: ₹<span id="total">0</span>
</div>

<script>
    let total = 0;
    let count = 0;

    function addToCart(price) {
        total += price;
        count++;

        document.getElementById("total").innerText = total;
        document.getElementById("count").innerText = count;
    }
</script>

</body>
</html>
